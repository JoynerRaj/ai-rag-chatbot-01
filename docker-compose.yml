services:

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  fastapi:
    build: ./fastapi_service
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - PINECONE_API_KEY=${PINECONE_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}

  django:
    build: ./django_chat
    ports:
      - "8001:8001"
    env_file:
      - .env
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - FASTAPI_URL=http://fastapi:8000/upload
      - REDIS_URL=redis://redis:6379
    depends_on:
      - fastapi
      - redis