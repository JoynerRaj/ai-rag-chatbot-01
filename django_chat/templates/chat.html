<!DOCTYPE html>
<html>
<head>
<title>AI Chatbot</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f172a;
    color: white;
}

.main {
    display: flex;
    height: 100vh;
}

.sidebar {
    width: 260px;
    background: #020617;
    border-right: 1px solid #1e293b;
    padding: 15px;
}

.sidebar h3 {
    margin-bottom: 10px;
}

.chat-wrapper {
    position: relative;
}

.chat-item {
    display: block;
    padding: 12px;
    border-radius: 10px;
    margin-bottom: 8px;
    background: #1e293b;
    color: white;
    text-decoration: none;
    transition: 0.2s;
}

.chat-item:hover {
    background: #334155;
}

.chat-item.active {
    background: #2563eb;
}

.chat-title {
    font-weight: bold;
    font-size: 14px;
}

.chat-preview {
    font-size: 12px;
    color: #94a3b8;
    margin-top: 3px;
}

.chat-time {
    font-size: 10px;
    text-align: right;
    color: #64748b;
    margin-top: 4px;
}

.delete-btn {
    position: absolute;
    top: 8px;
    right: 8px;
    font-size: 12px;
    color: #f87171;
    text-decoration: none;
    display: none;
}

.chat-wrapper:hover .delete-btn {
    display: block;
}

.chat-area {
    flex: 1;
    display: flex;
    flex-direction: column;
}

.header {
    text-align: center;
    padding: 15px;
    border-bottom: 1px solid #1e293b;
    font-weight: bold;
}

.top-bar {
    display: flex;
    justify-content: space-between;
    padding: 10px;
}

.chat-box {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
}

.message {
    max-width: 70%;
    padding: 10px;
    border-radius: 10px;
    margin: 5px 0;
    
    white-space: pre-wrap;
    word-wrap: break-word;
    overflow-wrap: break-word;
}

.user { background: #2563eb; align-self: flex-end; }
.bot { background: #1e293b; align-self: flex-start; }

.input-area {
    display: flex;
    padding: 10px;
    gap: 10px;
}

input {
    flex: 1;
    padding: 10px;
    border-radius: 6px;
    border: none;
}

button {
    padding: 10px;
    background: #22c55e;
    border: none;
    border-radius: 6px;
    color: white;
    cursor: pointer;
}

button:hover {
    background: #16a34a;
}
</style>

</head>

<body>

<div class="main">

    <div class="sidebar">

        <h3>Chats</h3>

        <a href="/new-chat/" class="chat-item" style="background:#22c55e;">
            + New Chat
        </a>

        {% for chat in chats %}
        <div class="chat-wrapper">

            <a href="/?chat_id={{ chat.id }}" 
               class="chat-item {% if chat.id|stringformat:'s' == current_chat_id %}active{% endif %}">
               
                <div class="chat-title">{{ chat.title }}</div>
                <div class="chat-preview">{{ chat.last_message }}</div>
                <div class="chat-time">{{ chat.time }}</div>

            </a>

            <a href="/delete-chat/{{ chat.id }}/" 
               onclick="return confirm('Delete this chat?')"
               class="delete-btn">❌</a>

        </div>
        {% endfor %}

    </div>

    <div class="chat-area">

        <div class="header">AI Chatbot</div>

        <div class="top-bar">
            <div>
                <strong>Select Document:</strong>

                <label><input type="radio" name="document" value="" checked> All</label>

                {% for doc in documents %}
                <label>
                    <input type="radio" name="document" value="{{ doc.pinecone_id }}">
                    {{ doc.title }}
                </label>
                {% endfor %}
            </div>

            <div>
                <a href="/documents/" style="color:white;">Manage</a>
            </div>
        </div>

        <div id="chat" class="chat-box"></div>

        <div class="input-area">
            <input id="msg" placeholder="Type message..." onkeydown="handleKey(event)">
            <button onclick="sendMessage()">Send</button>
        </div>

    </div>

</div>

<script>

let ws = null;
let chatBox = document.getElementById("chat");

const params = new URLSearchParams(window.location.search);
const chatId = params.get("chat_id");

chatBox.innerHTML = "";

if (chatId) {
    ws = new WebSocket(
        "ws://" + window.location.host + "/ws/chat/?chat_id=" + chatId
    );

    ws.onmessage = (event) => {
        const data = JSON.parse(event.data);

        if (data.type === "history") {
            addMessage(data.question, "user");
            addMessage(data.response, "bot");
            return;
        }

        removeTyping();
        typeMessage(data.response);

        updateSidebar(data.question);
    };
}

/* MESSAGE UI */
function addMessage(text, type) {
    let div = document.createElement("div");
    div.className = "message " + type;
    div.innerText = text;

    chatBox.appendChild(div);
    chatBox.scrollTop = chatBox.scrollHeight;
}

/* TYPING */
function showTyping() {
    let typing = document.createElement("div");
    typing.className = "message bot";
    typing.id = "typing";
    typing.innerText = "Typing...";
    chatBox.appendChild(typing);
    chatBox.scrollTop = chatBox.scrollHeight;
}

function removeTyping() {
    let typing = document.getElementById("typing");
    if (typing) typing.remove();
}

function typeMessage(text) {
    let div = document.createElement("div");
    div.className = "message bot";
    chatBox.appendChild(div);

    let i = 0;

    function typing() {
        if (i < text.length) {
            div.innerText += text.charAt(i);
            i++;
            setTimeout(typing, 15);
        }
    }

    typing();
}

/* SIDEBAR LIVE UPDATE */
function updateSidebar(lastMessage) {
    let activeChat = document.querySelector(".chat-item.active");

    if (!activeChat) return;

    let preview = activeChat.querySelector(".chat-preview");
    let time = activeChat.querySelector(".chat-time");

    if (preview) {
        preview.innerText = lastMessage.substring(0, 40);
    }

    if (time) {
        let now = new Date();
        let formatted = now.getHours().toString().padStart(2, '0') + ":" +
                        now.getMinutes().toString().padStart(2, '0');
        time.innerText = formatted;
    }
}

/* SEND */
function sendMessage() {
    let msg = document.getElementById("msg").value;

    if (!msg) return;

    if (!ws) {
        alert("Click + New Chat first");
        return;
    }

    addMessage(msg, "user");
    showTyping();

    ws.send(JSON.stringify({
        message: msg,
        document_id: getSelectedDocument()
    }));

    document.getElementById("msg").value = "";
}

function getSelectedDocument() {
    let selected = document.querySelector('input[name="document"]:checked');
    return selected ? selected.value : "";
}

function handleKey(e) {
    if (e.key === "Enter") sendMessage();
}

</script>

</body>
</html>
