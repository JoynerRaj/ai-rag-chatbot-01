<!DOCTYPE html>
<html>
<head>
    <title>AI Chatbot</title>
    <style>
        body {
            font-family: Arial;
            background: #2f2f3a;
            color: white;
        }

        #chat-box {
            height: 75vh;
            overflow-y: auto;
            padding: 10px;
        }

        .user {
            text-align: right;
            color: #4fc3f7;
            margin: 10px;
        }

        .bot {
            text-align: left;
            background: #444;
            padding: 10px;
            border-radius: 10px;
            margin: 10px;
            display: inline-block;
        }

        .bottom {
            position: fixed;
            bottom: 10px;
            width: 100%;
        }
    </style>
</head>
<body>

<h2 style="text-align:center;">AI Chatbot</h2>

<div id="chat-box"></div>

<div class="bottom">
    <input type="file" id="fileInput">
    <button onclick="uploadFile()">Upload</button>

    <br><br>

    <input type="text" id="message" placeholder="Type your message..." style="width:60%;">
    <button onclick="sendMessage()">Send</button>
</div>

<script>
    const chatBox = document.getElementById("chat-box");

    function addMessage(text, className) {
        const div = document.createElement("div");
        div.className = className;
        div.innerText = text;
        chatBox.appendChild(div);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    // ✅ WebSocket
    const socket = new WebSocket("ws://localhost:8000/ws/chat/");

    socket.onmessage = function(e) {
        const data = JSON.parse(e.data);
        addMessage(data.message, "bot");
    };

    function sendMessage() {
        const input = document.getElementById("message");
        const message = input.value;

        if (!message) return;

        addMessage(message, "user");

        socket.send(JSON.stringify({
            message: message
        }));

        input.value = "";
    }

    function uploadFile() {
        const fileInput = document.getElementById("fileInput");
        const file = fileInput.files[0];

        if (!file) {
            alert("Select file first");
            return;
        }

        const formData = new FormData();
        formData.append("file", file);

        fetch("http://localhost:8001/upload", {
            method: "POST",
            body: formData
        })
        .then(async res => {
            const data = await res.json();

            if (data.error) {
                addMessage("Upload error: " + data.error, "bot");
            } else {
                addMessage("Upload success ", "bot");
            }
        })
        .catch(err => {
            addMessage("Upload failed ", "bot");
            console.error(err);
        });
    }
</script>

</body>
</html>
