<!DOCTYPE html>
<html>
<head>
    <title>AI Chatbot</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #0f172a;
            color: white;
        }

        .container {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .header {
            text-align: center;
            padding: 15px;
            font-size: 22px;
            font-weight: bold;
            border-bottom: 1px solid #1e293b;
        }

        .top-bar {
            display: flex;
            justify-content: flex-end;
            padding: 10px 20px;
        }

        .top-bar a {
            color: white;
            text-decoration: none;
            background: #2563eb;
            padding: 8px 12px;
            border-radius: 8px;
        }

        .chat-box {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
        }

        .message {
            max-width: 70%;
            padding: 10px 15px;
            margin: 8px 0;
            border-radius: 10px;
        }

        .user {
            background: #2563eb;
            align-self: flex-end;
        }

        .bot {
            background: #1e293b;
            align-self: flex-start;
        }

        .input-area {
            display: flex;
            padding: 10px;
            border-top: 1px solid #1e293b;
            background: #020617;
        }

        input[type="text"] {
            flex: 1;
            padding: 10px;
            border-radius: 8px;
            border: none;
            outline: none;
        }

        button {
            margin-left: 10px;
            padding: 10px 15px;
            border: none;
            border-radius: 8px;
            background: #22c55e;
            color: white;
            cursor: pointer;
        }
    </style>
</head>

<body>

<div class="container">

    <div class="header">AI Chatbot</div>

    <div class="top-bar">
        <a href="/documents/">📄 Manage Documents</a>
    </div>

    <div id="chat" class="chat-box"></div>

    <div class="input-area">
        <input type="text" id="msg" placeholder="Type message..." onkeydown="handleKey(event)">
        <button onclick="sendMessage()">Send</button>
    </div>

</div>

<script>

let ws;

function connectWebSocket() {
    const protocol = window.location.protocol === "https:" ? "wss" : "ws";
    const wsUrl = `${protocol}://${window.location.host}/ws/chat/`;

    ws = new WebSocket(wsUrl);

    ws.onopen = () => {
        console.log("WebSocket connected");
    };

    ws.onmessage = (event) => {
        let data = JSON.parse(event.data);
        addMessage(data.response, "bot");
    };

    ws.onerror = (e) => {
        console.log("WebSocket error", e);
    };

    ws.onclose = () => {
        console.log("WebSocket closed... reconnecting");
        setTimeout(connectWebSocket, 1000);
    };
}

connectWebSocket();


function addMessage(text, sender) {
    let chat = document.getElementById("chat");

    let msg = document.createElement("div");
    msg.classList.add("message", sender);
    msg.innerText = text;

    chat.appendChild(msg);
    chat.scrollTop = chat.scrollHeight;
}


function sendMessage() {
    let input = document.getElementById("msg");
    let message = input.value.trim();

    if (!message) return;

    if (!ws || ws.readyState !== WebSocket.OPEN) {
        alert("WebSocket not connected yet");
        return;
    }

    addMessage(message, "user");

    ws.send(JSON.stringify({
        message: message
    }));

    input.value = "";
}


function handleKey(event) {
    if (event.key === "Enter") {
        sendMessage();
    }
}

</script>

</body>
</html>
