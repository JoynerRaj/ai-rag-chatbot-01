<!DOCTYPE html>
<html>
<head>
    <title>AI Chatbot</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #0f172a;
            color: white;
        }

        .container {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .header {
            text-align: center;
            padding: 15px;
            font-size: 22px;
            font-weight: bold;
            border-bottom: 1px solid #1e293b;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
        }

        .top-bar a {
            color: white;
            text-decoration: none;
            background: #2563eb;
            padding: 8px 12px;
            border-radius: 8px;
        }

        .doc-select {
            font-size: 14px;
        }

        .doc-list {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .chat-box {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
        }

        .message {
            max-width: 70%;
            padding: 10px 15px;
            margin: 8px 0;
            border-radius: 10px;
            white-space: pre-line;
        }

        .user {
            background: #2563eb;
            align-self: flex-end;
        }

        .bot {
            background: #1e293b;
            align-self: flex-start;
        }

        .source-box {
            font-size: 13px;
            background: #020617;
            border-left: 3px solid #22c55e;
        }

        .input-area {
            display: flex;
            padding: 10px;
            border-top: 1px solid #1e293b;
            background: #020617;
        }

        input[type="text"] {
            flex: 1;
            padding: 10px;
            border-radius: 8px;
            border: none;
            outline: none;
        }

        button {
            margin-left: 10px;
            padding: 10px 15px;
            border: none;
            border-radius: 8px;
            background: #22c55e;
            color: white;
            cursor: pointer;
        }

    </style>
</head>

<body>

<div class="container">

    <div class="header">AI Chatbot</div>

    <div class="top-bar">

        <div class="doc-select">
            <strong>Select Document:</strong>

            <div class="doc-list">
                <label>
                    <input type="radio" name="document" value="" checked>
                    All
                </label>

                {% for doc in documents %}
                <label>
                    <input type="radio" name="document" value="{{ doc.id }}">
                    {{ doc }}
                </label>
                {% endfor %}
            </div>
        </div>

        <a href="/documents/">📄 Manage</a>

    </div>

    <div id="chat" class="chat-box"></div>

    <div class="input-area">
        <input type="text" id="msg" placeholder="Type message..." onkeydown="handleKey(event)">
        <button onclick="sendMessage()">Send</button>
    </div>

</div>

<script>

let ws;

function connectWebSocket() {
    const protocol = window.location.protocol === "https:" ? "wss" : "ws";
    const wsUrl = `${protocol}://${window.location.host}/ws/chat/`;

    ws = new WebSocket(wsUrl);

    ws.onopen = () => {
        console.log("WebSocket connected");
    };

    ws.onmessage = (event) => {
        let data = JSON.parse(event.data);

        addMessage(data.response, "bot");

        if (data.sources && data.sources.length > 0) {
            showSources(data.sources);
        }
    };

    ws.onerror = (e) => {
        console.log("WebSocket error", e);
    };

    ws.onclose = () => {
        console.log("WebSocket closed... reconnecting");
        setTimeout(connectWebSocket, 1000);
    };
}

connectWebSocket();


function getSelectedDocument() {
    let selected = document.querySelector('input[name="document"]:checked');
    return selected ? selected.value : "";
}


function addMessage(text, sender) {
    let chat = document.getElementById("chat");

    let msg = document.createElement("div");
    msg.classList.add("message", sender);
    msg.innerText = text;

    chat.appendChild(msg);
    chat.scrollTop = chat.scrollHeight;
}


function showSources(sources) {
    let chat = document.getElementById("chat");

    let box = document.createElement("div");
    box.classList.add("message", "bot", "source-box");

    let text = "📄 Source:\n\n";

    sources.forEach((s, index) => {
        text += (index + 1) + ". " + s + "\n";
    });

    box.innerText = text;

    chat.appendChild(box);
    chat.scrollTop = chat.scrollHeight;
}


function sendMessage() {
    let input = document.getElementById("msg");
    let message = input.value.trim();

    if (!message) return;

    if (!ws || ws.readyState !== WebSocket.OPEN) {
        alert("WebSocket not connected yet");
        return;
    }

    let documentId = getSelectedDocument();

    addMessage(message, "user");

    ws.send(JSON.stringify({
        message: message,
        document_id: documentId
    }));

    input.value = "";
}


function handleKey(event) {
    if (event.key === "Enter") {
        sendMessage();
    }
}

</script>

</body>
</html>
