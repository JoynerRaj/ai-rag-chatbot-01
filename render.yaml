services:
  - type: web
    name: django-rag
    env: python
    rootDir: django_chat

    buildCommand: >
      pip install -r requirements.txt &&
      python manage.py migrate &&
      python manage.py collectstatic --noinput &&
      python manage.py shell -c "
      from django.contrib.sites.models import Site;
      Site.objects.update_or_create(id=1, defaults={'domain': 'django-rag.onrender.com', 'name': 'RAG Chatbot'});
      print('Site object ready')
      "

    # just boot the server - everything else is done above at build time
    startCommand: daphne -b 0.0.0.0 -p $PORT django_chat.asgi:application

    # lightweight endpoint that returns 200 immediately so Render knows we're up
    healthCheckPath: /health/