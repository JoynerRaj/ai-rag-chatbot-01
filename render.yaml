services:
  - type: web
    name: django-rag
    env: python
    rootDir: django_chat

    # run migrations and static collection at build time so Daphne can
    # start immediately on boot without Render's port scanner timing out
    buildCommand: >
      pip install -r requirements.txt &&
      python manage.py migrate &&
      python manage.py collectstatic --noinput

    # just start the server - everything else is already done in buildCommand
    startCommand: daphne -b 0.0.0.0 -p $PORT django_chat.asgi:application

    # Render uses this endpoint to confirm the service is healthy
    # /health/ returns a plain 200 OK immediately without any DB/Redis queries
    healthCheckPath: /health/