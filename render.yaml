services:
  - type: web
    name: django-rag
    env: python
    rootDir: django_chat

    buildCommand: |
      pip install -r requirements.txt
      python manage.py makemigrations
      python manage.py migrate
      python manage.py collectstatic --noinput

    startCommand: daphne -b 0.0.0.0 -p $PORT django_chat.asgi:application