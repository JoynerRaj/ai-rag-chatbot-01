services:
  - type: web
    name: django-rag
    env: python
    rootDir: django_chat

    buildCommand: pip install -r requirements.txt

    startCommand: >
      bash -c "
      echo 'RUNNING MIGRATIONS...' &&
      python manage.py migrate &&
      echo 'MIGRATION DONE' &&
      python manage.py collectstatic --noinput &&
      echo 'STARTING SERVER' &&
      daphne -b 0.0.0.0 -p $PORT django_chat.asgi:application
      "